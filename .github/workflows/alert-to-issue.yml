# Code Scanning アラート → Issue 自動起票 + Copilot Coding Agent assign
#
# トリガー: workflow_run（Semgrep スキャン完了後）
#
# 処理:
#   1. Semgrep スキャン完了を検知
#   2. Code Scanning API で open アラート一覧を取得
#   3. 重要度に応じてトリアージ:
#      - Critical/High → Issue 作成 + copilot assign（自動修正）
#      - Medium → Issue 作成 + security ラベル（手動レビュー）
#      - Low/Note → スキップ
#   4. Issue 本文に修正に必要なコンテキストを記載（= Agent へのプロンプト）
#
# 前提:
#   - リポジトリに `copilot` ユーザーが assign 可能であること
#   - GITHUB_TOKEN の permissions で issues: write, security-events: read が必要

name: Alert to Issue (Copilot Agent)

on:
  workflow_run:
    workflows: ["Semgrep SAST Scan"]
    types: [completed]

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  triage-and-create-issues:
    name: Triage Alerts & Create Issues
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Wait for Code Scanning to process SARIF
        run: sleep 60

      - name: Fetch alerts and create issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Code Scanning API で open アラートを取得
            // まずツール名フィルタなしで全アラートを取得し、デバッグ出力
            var alerts = [];
            try {
              var resp = await github.rest.codeScanning.listAlertsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });
              alerts = resp.data;
              console.log('Total open alerts: ' + alerts.length);
              if (alerts.length > 0) {
                var toolNames = alerts.map(function(a) { return a.tool ? a.tool.name : 'unknown'; });
                var unique = toolNames.filter(function(v, i, s) { return s.indexOf(v) === i; });
                console.log('Tool names found: ' + unique.join(', '));
              }
            } catch (e) {
              console.log('Failed to fetch code scanning alerts: ' + e.message);
              console.log('This may happen if SARIF is still being processed. Try re-running.');
              return;
            }

            console.log('Found ' + alerts.length + ' open Semgrep alerts.');
            if (alerts.length === 0) return;

            // 既存 Issue を取得（重複チェック用）
            var existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,code-scanning',
              per_page: 100,
            });
            var existingBodies = existingIssues.data.map(function(i) { return i.body || ''; });

            // ラベルの確保
            var labelDefs = [
              { name: 'security', color: 'e11d48', desc: 'Security vulnerability' },
              { name: 'code-scanning', color: '7c3aed', desc: 'Detected by code scanning' },
              { name: 'copilot-fix', color: '2563eb', desc: 'Copilot Coding Agent に自動修正を依頼' }
            ];
            for (var ld = 0; ld < labelDefs.length; ld++) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelDefs[ld].name,
                });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelDefs[ld].name,
                  color: labelDefs[ld].color,
                  description: labelDefs[ld].desc,
                });
              }
            }

            var createdCount = 0;
            var skippedCount = 0;

            for (var i = 0; i < alerts.length; i++) {
              var alert = alerts[i];
              var rule = alert.rule;
              var ruleId = rule.id || 'unknown';
              var severity = rule.security_severity_level || rule.severity || 'unknown';
              var location = alert.most_recent_instance && alert.most_recent_instance.location ? alert.most_recent_instance.location : {};
              var fp = location.path || 'unknown';
              var sl = location.start_line || '?';
              var el = location.end_line || sl;

              // Low / Note はスキップ
              if (severity === 'low' || severity === 'note') {
                skippedCount++;
                continue;
              }

              // 重複チェック
              var dupTag = '<!-- alert:' + ruleId + ':' + fp + ' -->';
              var isDup = false;
              for (var ei = 0; ei < existingBodies.length; ei++) {
                if (existingBodies[ei].indexOf(dupTag) !== -1) {
                  isDup = true;
                  break;
                }
              }
              if (isDup) {
                console.log('Skip duplicate: ' + ruleId + ' in ' + fp);
                skippedCount++;
                continue;
              }

              var isCritHigh = (severity === 'critical' || severity === 'high');
              var emoji = isCritHigh ? '\uD83D\uDD34' : '\uD83D\uDFE1';
              var description = rule.description || 'N/A';
              var lineRange = (el !== sl) ? ('-L' + el) : '';
              var alertLink = alert.html_url ? '- [Code Scanning アラート詳細](' + alert.html_url + ')' : '';
              var ruleName = rule.name || ruleId;

              var lines = [
                dupTag,
                '',
                '## ' + emoji + ' セキュリティ脆弱性: ' + ruleName,
                '',
                '**重要度**: ' + severity.toUpperCase(),
                '**検出ルール**: `' + ruleId + '`',
                '**ファイル**: `' + fp + '` (L' + sl + lineRange + ')',
                '**説明**: ' + description,
                '',
                '### 修正依頼',
                '',
                '以下のセキュリティ脆弱性を修正してください。',
                '',
                '1. **問題箇所**: `' + fp + '` の ' + sl + ' 行目付近',
                '2. **脆弱性タイプ**: ' + ruleName,
                '3. **修正方針**:',
                '   - 入力値のバリデーション/サニタイズを追加',
                '   - セキュアなAPIやライブラリに置き換え',
                '   - ハードコードされた秘密情報は環境変数に移行',
                '   - 既存のテストが壊れないように注意',
                '',
                '### 参考情報',
                '',
                '- SARIF ルール: ' + ruleId,
                '- [OWASP Top 10](https://owasp.org/www-project-top-ten/)',
                alertLink,
                '',
                '### 期待される修正',
                '',
                '- [ ] 脆弱性が解消されていること',
                '- [ ] 既存の機能が壊れていないこと',
                '- [ ] 新しいテストが追加されていること（可能であれば）',
              ];
              var issueBody = lines.join('\n');
              var issueTitle = '[Security] ' + severity.toUpperCase() + ': ' + ruleName + ' in ' + fp;

              var labels = ['security', 'code-scanning'];
              if (isCritHigh) labels.push('copilot-fix');

              var createParams = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: labels,
              };
              if (isCritHigh) {
                createParams.assignees = ['copilot'];
              }

              var issue = await github.rest.issues.create(createParams);
              console.log('Created issue #' + issue.data.number + ': ' + issueTitle);
              existingBodies.push(issueBody);
              createdCount++;
            }

            console.log('Done. Created: ' + createdCount + ', Skipped: ' + skippedCount);
