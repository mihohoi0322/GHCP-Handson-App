# Semgrep SAST スキャン → Code Scanning アラート登録
#
# トリガー:
#   - push (main, feat/security-scan-poc)
#   - pull_request (main)
#   - 手動 (workflow_dispatch)
#
# 処理:
#   1. Semgrep でスキャン → SARIF ファイル生成
#   2. SARIF を GitHub Code Scanning にアップロード
#
# 前提: リポジトリで Code Scanning (GHAS) が有効であること

name: Semgrep SAST Scan

on:
  push:
    branches: [main, 'feat/security-scan-poc']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF アップロードに必要

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config auto \
            --config p/security-audit \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            vulnerable-samples/ src/ \
            || true
        # || true: スキャン結果に関わらず後続ステップを実行（アラートを登録するため）

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload SARIF as artifact (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 30
